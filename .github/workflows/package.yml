name: Manual Extension Package

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab in the GitHub UI

permissions:
  contents: write # Grant permission to push commits back to the repository

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run package script
        run: npm run package

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json KSTable-Engine-*.zip
          
          # Only commit and push if there are changes (e.g. new zip file or package.json version update)
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build and package extension [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Upload packaged extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: KSTable-Engine-*.zip
